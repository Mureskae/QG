syntax = "proto3";
package qgchaind.qg.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "qgchaind/x/qg/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "qgchaind/x/qg/Params";
  option (gogoproto.equal) = true;
  
}