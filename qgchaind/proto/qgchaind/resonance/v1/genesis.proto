syntax = "proto3";
package qgchaind.resonance.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qgchaind/resonance/v1/params.proto";

option go_package = "qgchaind/x/resonance/types";

// GenesisState defines the resonance module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
